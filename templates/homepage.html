<!DOCTYPE html>
<html lang="it">
<head>
  <meta name="google-site-verification" content="jrLlMUr238MQYVMeQ7r2uhAJ8-GapQtBIU002XILGbM" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TriviaPork</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background:  #f1e3be;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.8rem;
    }

 .corner{position:fixed;font-family:'Press Start 2P',cursive;font-size:0.55rem;color:#d4b87a;pointer-events:none;}
 .corner.bl{bottom:1.2rem;left:1.5rem;}
 .corner.br{bottom:1.2rem;right:1.5rem;}


    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .logo svg {
      width: 28px;
      height: 28px;
    }
    .logo span {
      font-size: 1.1rem;
      font-weight: 500;
      color: #333;
      letter-spacing: 0.04em;
    }

    h1 {
      font-size: 3rem;
      font-weight: 500;
      color: #1a1a1a;
      letter-spacing: -0.02em;
    }


.switch {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100px;
  height: 36px;
}

.toggle {
  opacity: 0;
  width: 0;
  height: 0;
  position: absolute;
}

/* ── BANDIERA ITALIANA ── */
.slider {
  background: 
    linear-gradient(rgba(232,226,217,0.30), rgba(232,226,217,0.09)),
    linear-gradient(to right, #4a7c5f 33%, #d6d0c8 33%, #d6d0c8 66%, #9e4a4a 66%);
  box-sizing: border-box;
  border-radius: 100px;
  border: 2px solid #323232;
  box-shadow: 4px 4px #323232;
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(
    to right,
    #009246 33%,
    #fff    33%, #fff 66%,
    #CE2B37 66%
  );
  transition: background 0.3s;
  overflow: hidden;
}

/* pallino IT — stesso verde della sezione sinistra */
.slider:before {
  content: "IT";
  box-sizing: border-box;
  height: 28px;
  width: 28px;
  position: absolute;
  left: 2px;
  bottom: 2px;
  border: 2px solid #323232;
  border-radius: 100px;
  background-color: #009246;
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  text-align: center;
  line-height: 24px;
  transition: transform 0.3s, background-color 0.3s;
  z-index: 1;
}

/* ── UNION JACK ── */
.toggle:checked + .slider {
  background:
    linear-gradient(rgba(232,226,217,0.30), rgba(232,226,217,0.09)),
    /* St George - croce rossa */
    linear-gradient(transparent 36%, #C8102E 36%, #C8102E 64%, transparent 64%),
    linear-gradient(90deg, transparent 43%, #C8102E 43%, #C8102E 57%, transparent 57%),
    /* bordo bianco croce */
    linear-gradient(transparent 28%, #fff 28%, #fff 72%, transparent 72%),
    linear-gradient(90deg, transparent 40%, #fff 40%, #fff 60%, transparent 60%),
    /* diagonali rosse */
    linear-gradient(45deg,  transparent 47%, #C8102E 47%, #C8102E 53%, transparent 53%),
    linear-gradient(-45deg, transparent 47%, #C8102E 47%, #C8102E 53%, transparent 53%),
    /* diagonali bianche St Andrew */
    linear-gradient(45deg,  transparent 43%, #fff 43%, #fff 57%, transparent 57%),
    linear-gradient(-45deg, transparent 43%, #fff 43%, #fff 57%, transparent 57%),
    /* sfondo blu */
    #012169;
}

/* pallino EN — stesso blu dello sfondo */
.toggle:checked + .slider:before {
  content: "EN";
  transform: translateX(64px);
  background-color: #012169;
}
  a {
      font-size: 1rem;
      font-weight: 500;
      background: #1a1a1a;
      color: #fff;
      padding: 0.85rem 2.8rem;
      border-radius: 6px;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.75; }
  </style>
</head>
<body>

<label class="switch">
  <input type="checkbox" class="toggle"
         {{ 'checked' if lang == 'en' else '' }}
         onchange="window.location.href='/lang/' + (this.checked ? 'en' : 'it')">
  <span class="slider"></span>
</label>
 
   <div class="corner bl">v1.0</div>
   <div class="corner br">Made by Marco Zambrella</div>

  <div class="logo">
    <!-- small pig face svg -->
      <div style="width: 120px; height: 120px; border-radius: 50%; overflow: hidden;">
    <img src="{{ url_for('static', filename='porco.jpg') }}" style="width:120px; border-radius:50%;">
  </div>
    <span 
    style="font-family: 'Press Start 2P', cursive;
    font-size: 1.1rem;
    color: #1a1a1a;"> TriviaPork</span>
  </div>
  
  <a href="/giocatori">{{ t.play_now | safe }}</a>

</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giocatori</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f1e3be;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
    }
    h2 {
      font-size: 1.6rem;
      font-weight: 500;
      color: #1a1a1a;
      letter-spacing: -0.01em;
    }
    .input-row {
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    button.dec, button.inc {
      font-size: 1.5rem;
      width: 2.8rem;
      height: 2.8rem;
      background: #fff;
      color: #1a1a1a;
      border: 1px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button.dec:hover, button.inc:hover { background: #f0ecec; }
    #count {
      font-size: 4rem;
      font-weight: 500;
      color: #1a1a1a;
      min-width: 3rem;
      text-align: center;
    }
    button.start {
      font-size: 1rem;
      font-weight: 500;
      background: #1a1a1a;
      color: #fff;
      border: none;
      padding: 0.85rem 2.8rem;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button.start:hover { opacity: 0.75; }
    a.back {
      font-size: 0.8rem;
      font-weight: 300;
      color: #999;
      text-decoration: none;
    }
    a.back:hover { color: #555; }


  </style>
</head>
<body>

  <h2>{{t.how_many}}</h2>

  <form action="/giocatori" method="POST">
  <input type="hidden" name="n" id="inputN" value="2">

  <div class="input-row">
    <button type="button" class="dec" onclick="change(-1)">−</button>
    <div>
      <div id="count">2</div>
      <div></div>
    </div>
    <button type="button" class="inc" onclick="change(1)">+</button>
  </div>

  <button type="submit" class="start" style=" transform: translate(35px, 16px);">{{t.next}}</button>
  </form>

  <script>
    let n = 2;
    function change(d) {
      n = Math.max(1, Math.min(4, n + d));
      document.getElementById('count').textContent = n;
      document.getElementById('inputN').value = n;
    }
  </script>



</body>
</html>
